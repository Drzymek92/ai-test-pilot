# CI runs the full unit suite, which is browser-free by design: the web_playwright tests
# assert on the GENERATED test source (emit/contract level), so no Chromium is needed here.
# Live browser runs (the --serve demos in demo/login_app and demo/ws_app) are exercised
# locally after `python -m playwright install chromium`, not in CI.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -q
